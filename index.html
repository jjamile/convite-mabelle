<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Mabelle 15 anos</title>


<link rel="stylesheet" href="style.css">


</head>



<body>



<!-- TELA DE ABERTURA -->

<div id="entrada">


<div class="abertura">


<h1>Mabelle</h1>

<h2>15 anos</h2>


<button onclick="abrirConvite()">

Abrir convite ✨

</button>


</div>


</div>





<!-- MUSICA -->


<audio id="musica" loop preload="auto">


<source src="assets/musica.mp3" type="audio/mp3">


</audio>




<!-- BOTAO MUSICA -->


<button id="botaoMusica" onclick="controleMusica()">

🔊 Música ON

</button>






<!-- CONTEUDO DO CONVITE -->


<div id="conteudo">



<img 

src="assets/convite.png.jpeg"

class="convite"

>




<br>



<button onclick="abrirMapa()">

📍 Localização

</button>





<h2>

Confirme sua presença

</h2>





<input 

id="nome"

placeholder="Seu nome"

>





<select id="quantidade">


<option value="1">

1 pessoa

</option>


<option value="2">

2 pessoas

</option>


<option value="3">

3 pessoas

</option>


<option value="4">

4 pessoas

</option>


<option value="5">

5 pessoas

</option>


<option value="6">

6 pessoas

</option>


<option value="7">

7 pessoas

</option>


<option value="8">

8 pessoas

</option>


<option value="9">

9 pessoas

</option>


<option value="10">

10 pessoas

</option>


</select>






<select id="resposta">


<option>

Vou comparecer

</option>


<option>

Não poderei ir

</option>


</select>






<button onclick="confirmar()">


Confirmar 💚


</button>




</div>






<script src="script.js"></script>



</body>


</html>
